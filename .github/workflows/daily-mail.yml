name: Daily Morning Bot

on:
  schedule:
    # Runs every day at 07:00 UTC — adjust to your timezone offset:
    #   IST (UTC+5:30) → "30 1 * * *"
    #   EST (UTC-5)    → "0 12 * * *"
    #   PST (UTC-8)    → "0 15 * * *"
    - cron: "0 7 * * *"

  # Lets you trigger it manually from GitHub → Actions tab
  workflow_dispatch:

jobs:
  send-morning-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: ☀️ Run Morning Bot
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          CITY_NAME:           ${{ secrets.CITY_NAME }}
          EMAIL_SENDER:        ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:      ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:     ${{ secrets.EMAIL_RECIPIENT }}
        run: python daily_bot.py
